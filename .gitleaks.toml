# Gitleaks configuration for KadGlobe
[allowlist]
description = "Allowlist for example environment files and non-sensitive data"
paths = [
    '''.env.windows.example''',
    '''.env.linux.example''',
    '''frontend/index.html''',
    '''README.md''',
    '''README_EN.md'''
]
regexes = [
    '''ADMIN_PASS=.*''',
    '''[a-f0-9]{32}''', # Allow Kad IDs which are 32-char hex
    '''sqp_[a-f0-9]{40}''' # Detect SonarQube tokens
]

